<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <link rel="stylesheet" href="styles/grid.css">
</head>
<body>
    <div class="grid-container">
        <div class="grid-item1">grid text</div>
        <div class="grid-item2">grid <P>text</P></div>
    </div>

    <div class="grid-container2">
        <div class="grid-item3">100px</div>
        <div class="grid-item4">100px <p>text</p></div>
        <div class="grid-item3">200px</div>
        <div class="grid-item4">100px</div>
    </div>

    <div class="grid-container3">
        <div class="grid-item5">100px</div>
        <div class="grid-item6">1fr = free space. means taking up entire space </div>
    </div>

    <div class="grid-container4">
        <div class="grid-item7">100px</div>
        <div class="grid-item8">1fr = free space. means taking up entire space </div>
        <div class="grid-item7">2fr = free space. means taking up entire space </div>
    </div>

    <div class="grid-container5">
        <div class="grid-item9">1</div>
        <div class="grid-item10">2</div>
        <div class="grid-item9">3</div>
        <div class="grid-item10">4</div> 
        <div class="grid-item9">1</div>
        <div class="grid-item10">2</div>
        <div class="grid-item9">3</div>
        <div class="grid-item10">4</div> 
    </div>
</body>
</html>
