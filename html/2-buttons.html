<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <link rel="stylesheet" href="styles/button.css">
</head>
<body>
    
    <div class="division">
        <div class="header">
            <h2>Youtube Buttons</h2>
        </div>
        
        <div class="buttons">
            <button class="subscribe-button">SUBSCRIBE</button>
            <button class="join-button">JOIN</button>
            <button class="tweet-button">TWEET</button>
        </div>
    </div>
    
    <div class="division">
        <div class="header">
            <h2>Uber Button</h2>
        </div>
        
        <div class="buttons">
            <button class="uber-button">Request now</button>
        </div>
    </div>

    <div class="division">
        <div class="header">
            <h2>Amazon Button</h2>
        </div>
        
        <div class="buttons">
            <button class="amazon-button">Add to cart</button>
        </div>
    </div>

    <div class="division">
        <div class="header">
            <h2>Github Button</h2>
        </div>
        
        <div class="buttons">
            <button class="github-button">Sign up</button>
        </div>
    </div>

    <div class="division">
        <div class="header">
            <h2>Bootstrap Button</h2>
        </div>
        
        <div class="buttons">
            <button class="getstarted-button">Get started</button>
            <button class="download-button">Download</button>
        </div>
    </div>

    <div class="division">
        <div class="header">
            <h2>My Button</h2>
        </div>
        
        <div class="buttons">
            <button class="keep-button">Keep</button>
            <button class="dreaming-button">Dreaming</button>
        </div>
    </div>
</body>
</html>
