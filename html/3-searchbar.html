<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Searchbar</title>
    <link rel="stylesheet" href="styles/searchbar.css">
</head>
<body>
    <div class="searchbar">
        <input class="normal-searchbar" type="text" placeholder="Search">
    </div>
<hr>
    <div class="searchbar">
        <input class="normal-searchbar2" type="text" placeholder="Search Google or type a URL">
    </div>
<hr>
    <div class="searchbar">
        <p class="label">Email</p>
        <input class="email" type="text">
        <p class="privacy-policy">By clicking Agree & Join, you agree the Privacy Policy</p>
        <button class="email-button">Agree & Join</button> 
    </div>
<hr>
    <div class="searchbar">
        <img class="cat-images" src="images/cat2.jpg" alt="">
        <input class="twitter" type="text" placeholder="What's happening?">
        <button class="tweet-button">Tweet</button>
    </div>
</body>
</html>
